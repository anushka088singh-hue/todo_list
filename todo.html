<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todoie App</title>
    <link rel="stylesheet" href="todo.css">
</head>
<body>

    <h1>Todoie App</h1>

    <div class="container">

        <h2>Todo</h2>

        <div class="input-box">
            <input
                type="text"
                id="taskInput"
                placeholder="Enter your task"
            >

            <button id="addBtn">
                Add Todo
            </button>
        </div>

        <ul id="taskList">

            <li>
                <div class="left">
                    <input type="checkbox">
                    <span>Eat</span>
                </div>
            </li>

            <li>
                <div class="left">
                    <input type="checkbox">
                    <span>Code</span>
                </div>
            </li>

            <li>
                <div class="left">
                    <input type="checkbox">
                    <span>Sleep</span>
                </div>
            </li>

            <li>
                <div class="left">
                    <input type="checkbox">
                    <span>Repeat</span>
                </div>
            </li>

        </ul>

    </div>

    <script src="todo.js"></script>

</body>
</html>
